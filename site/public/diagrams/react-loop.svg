<svg width="600" height="320" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .label { font-size: 15px; font-weight: 600; fill: #e2e8f0; }
    .sublabel { font-size: 11px; fill: #94a3b8; }
    .arrow { stroke: #6366f1; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    .box { rx: 12; ry: 12; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="320" rx="16" fill="#0f1117"/>
  <rect width="600" height="320" rx="16" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#a78bfa">The ReAct Loop</text>

  <!-- OBSERVE box -->
  <rect class="box" x="220" y="56" width="160" height="52" fill="#1e1b4b" stroke="#6366f1"/>
  <text class="label" x="300" y="79" text-anchor="middle">Observe</text>
  <text class="sublabel" x="300" y="97" text-anchor="middle">Receive input or result</text>

  <!-- Arrow: Observe → Think (right arc) -->
  <path class="arrow" d="M 380 82 Q 480 82, 480 160"/>

  <!-- THINK box -->
  <rect class="box" x="400" y="134" width="160" height="52" fill="#1e1b4b" stroke="#818cf8"/>
  <text class="label" x="480" y="157" text-anchor="middle">Think</text>
  <text class="sublabel" x="480" y="175" text-anchor="middle">LLM reasons next step</text>

  <!-- Arrow: Think → Act (bottom arc) -->
  <path class="arrow" d="M 480 186 Q 480 260, 380 260"/>

  <!-- ACT box -->
  <rect class="box" x="220" y="234" width="160" height="52" fill="#1e1b4b" stroke="#a78bfa"/>
  <text class="label" x="300" y="257" text-anchor="middle">Act</text>
  <text class="sublabel" x="300" y="275" text-anchor="middle">Call tool or return output</text>

  <!-- Arrow: Act → Observe (left arc) -->
  <path class="arrow" d="M 220 260 Q 120 260, 120 160"/>

  <!-- Cycle indicator -->
  <path d="M 120 160 Q 120 82, 220 82" class="arrow"/>

  <!-- Center cycle icon -->
  <circle cx="300" cy="170" r="24" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="300" y="176" text-anchor="middle" font-size="20">🔄</text>

  <!-- Exit label -->
  <text x="300" y="308" text-anchor="middle" font-size="11" fill="#64748b">Loop until task complete or max iterations reached</text>
</svg>
