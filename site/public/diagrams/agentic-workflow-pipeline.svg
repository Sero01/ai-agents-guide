<svg width="640" height="340" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #a78bfa; }
    .stage-label { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .stage-sub { font-size: 10px; fill: #94a3b8; }
    .stage-type { font-size: 9px; fill: #818cf8; font-weight: 500; }
    .arrow { stroke: #6366f1; stroke-width: 2.5; fill: none; marker-end: url(#a); }
    .data-label { font-size: 9px; fill: #4ade80; font-weight: 500; }
  </style>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="340" rx="16" fill="#0f1117"/>
  <rect width="640" height="340" rx="16" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title -->
  <text class="title" x="320" y="32" text-anchor="middle">Agentic Workflow Pipeline</text>

  <!-- INPUT -->
  <rect x="20" y="65" width="90" height="40" rx="20" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="65" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Input</text>

  <!-- Arrow: Input → Stage 1 -->
  <line class="arrow" x1="110" y1="85" x2="140" y2="85"/>

  <!-- Stage 1 -->
  <rect x="140" y="55" width="110" height="100" rx="10" fill="#111827" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="195" y="76" text-anchor="middle" font-size="16">🔍</text>
  <text class="stage-label" x="195" y="96" text-anchor="middle">Stage 1</text>
  <text class="stage-sub" x="195" y="112" text-anchor="middle">Data Gathering</text>
  <rect x="155" y="124" width="80" height="18" rx="9" fill="#1e1b4b"/>
  <text class="stage-type" x="195" y="137" text-anchor="middle">Search Agent</text>

  <!-- Arrow: Stage 1 → Stage 2 -->
  <line class="arrow" x1="250" y1="85" x2="280" y2="85"/>
  <text class="data-label" x="265" y="76" text-anchor="middle">raw data</text>

  <!-- Stage 2 -->
  <rect x="280" y="55" width="110" height="100" rx="10" fill="#111827" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="335" y="76" text-anchor="middle" font-size="16">🧪</text>
  <text class="stage-label" x="335" y="96" text-anchor="middle">Stage 2</text>
  <text class="stage-sub" x="335" y="112" text-anchor="middle">Analysis</text>
  <rect x="295" y="124" width="80" height="18" rx="9" fill="#1e1b4b"/>
  <text class="stage-type" x="335" y="137" text-anchor="middle">Code Agent</text>

  <!-- Arrow: Stage 2 → Stage 3 -->
  <line class="arrow" x1="390" y1="85" x2="420" y2="85"/>
  <text class="data-label" x="405" y="76" text-anchor="middle">analysis</text>

  <!-- Stage 3 (Human Review) -->
  <rect x="420" y="55" width="110" height="100" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="475" y="76" text-anchor="middle" font-size="16">👤</text>
  <text class="stage-label" x="475" y="96" text-anchor="middle">Stage 3</text>
  <text class="stage-sub" x="475" y="112" text-anchor="middle">Human Review</text>
  <rect x="435" y="124" width="80" height="18" rx="9" fill="#451a03"/>
  <text x="475" y="137" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="500">Checkpoint</text>

  <!-- Arrow: Stage 3 → Stage 4 -->
  <line class="arrow" x1="530" y1="85" x2="555" y2="85"/>

  <!-- Stage 4 (Output) -->
  <rect x="555" y="65" width="65" height="40" rx="20" fill="#1e1b4b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="587" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">Output</text>

  <!-- Benefits section -->
  <line x1="40" y1="195" x2="600" y2="195" stroke="#1e293b" stroke-width="1"/>

  <!-- Benefit 1: Debuggable -->
  <rect x="30" y="215" width="175" height="55" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="48" y="237" font-size="14">🐛</text>
  <text x="70" y="238" font-size="12" font-weight="600" fill="#e2e8f0">Debuggable</text>
  <text x="117" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">Know exactly which stage failed</text>

  <!-- Benefit 2: Resumable -->
  <rect x="230" y="215" width="175" height="55" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="248" y="237" font-size="14">🔄</text>
  <text x="270" y="238" font-size="12" font-weight="600" fill="#e2e8f0">Resumable</text>
  <text x="317" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">Retry failed stages, keep the rest</text>

  <!-- Benefit 3: Composable -->
  <rect x="430" y="215" width="175" height="55" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="448" y="237" font-size="14">🧩</text>
  <text x="470" y="238" font-size="12" font-weight="600" fill="#e2e8f0">Composable</text>
  <text x="517" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">Swap stages without rewriting</text>

  <!-- Bottom note -->
  <text x="320" y="310" text-anchor="middle" font-size="11" fill="#64748b">Each stage has defined inputs and outputs — test and develop independently</text>
</svg>
