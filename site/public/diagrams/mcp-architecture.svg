<svg width="640" height="380" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #a78bfa; }
    .label { font-size: 13px; font-weight: 600; fill: #e2e8f0; }
    .sublabel { font-size: 11px; fill: #94a3b8; }
    .box { rx: 10; ry: 10; }
    .connector { stroke: #6366f1; stroke-width: 2; fill: none; marker-end: url(#arr); }
    .connector-bi { stroke: #6366f1; stroke-width: 2; fill: none; marker-end: url(#arr); marker-start: url(#arr-rev); }
    .protocol-label { font-size: 10px; fill: #818cf8; font-weight: 500; }
  </style>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/>
    </marker>
    <marker id="arr-rev" markerWidth="7" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="380" rx="16" fill="#0f1117"/>
  <rect width="640" height="380" rx="16" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title -->
  <text class="title" x="320" y="32" text-anchor="middle">MCP Client-Server Architecture</text>

  <!-- YOUR APP container -->
  <rect class="box" x="30" y="50" width="580" height="110" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
  <text x="50" y="72" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.08em">YOUR APPLICATION</text>

  <!-- LLM box -->
  <rect class="box" x="50" y="84" width="170" height="58" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text class="label" x="135" y="108" text-anchor="middle">Claude / LLM</text>
  <text class="sublabel" x="135" y="125" text-anchor="middle">Decides when to call tools</text>

  <!-- MCP Client box -->
  <rect class="box" x="300" y="84" width="170" height="58" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text class="label" x="385" y="108" text-anchor="middle">MCP Client</text>
  <text class="sublabel" x="385" y="125" text-anchor="middle">Routes tool calls</text>

  <!-- LLM ↔ MCP Client connector -->
  <line class="connector-bi" x1="220" y1="113" x2="300" y2="113"/>

  <!-- Protocol divider -->
  <line x1="30" y1="195" x2="610" y2="195" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="238" y="184" width="164" height="22" rx="11" fill="#0f1117"/>
  <text class="protocol-label" x="320" y="199" text-anchor="middle">JSON-RPC over stdio / SSE</text>

  <!-- MCP Servers -->
  <!-- Server 1: Filesystem -->
  <rect class="box" x="30" y="225" width="170" height="70" fill="#111827" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="44" y="246" font-size="18">📁</text>
  <text class="label" x="72" y="248">Filesystem Server</text>
  <text class="sublabel" x="115" y="266" text-anchor="middle">read, write, search files</text>
  <text x="115" y="284" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="500">Local (stdio)</text>

  <!-- Server 2: GitHub -->
  <rect class="box" x="235" y="225" width="170" height="70" fill="#111827" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="249" y="246" font-size="18">🐙</text>
  <text class="label" x="277" y="248">GitHub Server</text>
  <text class="sublabel" x="320" y="266" text-anchor="middle">repos, issues, PRs</text>
  <text x="320" y="284" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="500">Local (stdio)</text>

  <!-- Server 3: Database -->
  <rect class="box" x="440" y="225" width="170" height="70" fill="#111827" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="454" y="246" font-size="18">🗄️</text>
  <text class="label" x="482" y="248">Database Server</text>
  <text class="sublabel" x="525" y="266" text-anchor="middle">query, insert, migrate</text>
  <text x="525" y="284" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="500">Remote (SSE)</text>

  <!-- Connectors from MCP Client down to servers -->
  <line class="connector" x1="345" y1="142" x2="115" y2="225"/>
  <line class="connector" x1="385" y1="142" x2="320" y2="225"/>
  <line class="connector" x1="425" y1="142" x2="525" y2="225"/>

  <!-- Bottom label -->
  <text x="320" y="325" text-anchor="middle" font-size="12" fill="#64748b">Each server is an independent process — build once, use with any MCP client</text>

  <!-- Server count badge -->
  <rect x="228" y="342" width="184" height="24" rx="12" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1"/>
  <text x="320" y="359" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="500">100+ pre-built servers available</text>
</svg>
